<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Stretch" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <title>Stretch Plan</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --card: #21253a;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --text: #e8eaf6;
      --muted: #8b8fa8;
      --morning: #f59e0b;
      --bed: #818cf8;
      --border: rgba(255,255,255,0.07);
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: calc(var(--safe-top) + 14px) 20px 14px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--accent2);
    }

    header span {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 500;
    }

    /* Day nav */
    .day-nav {
      background: var(--surface);
      padding: 12px 16px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }
    .day-nav::-webkit-scrollbar { display: none; }

    .day-tabs {
      display: flex;
      gap: 8px;
      max-width: 600px;
      margin: 0 auto;
    }

    .day-tab {
      flex-shrink: 0;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .day-tab:hover { color: var(--text); border-color: var(--accent); }
    .day-tab.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .day-tab.today-tab { border-color: var(--accent2); color: var(--accent2); }
    .day-tab.today-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

    /* Content */
    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px calc(var(--safe-bottom) + 20px);
    }

    .day-header {
      margin-bottom: 20px;
    }
    .day-header h2 {
      font-size: 1.6rem;
      font-weight: 800;
    }
    .day-header .today-badge {
      display: inline-block;
      margin-top: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent2);
      background: rgba(167,139,250,0.12);
      padding: 3px 8px;
      border-radius: 20px;
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 24px 0 10px;
    }
    .section-label.morning { color: var(--morning); }
    .section-label.bed { color: var(--bed); }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .exercise-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .exercise-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .exercise-detail {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .exercise-links {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 2px;
    }

    .exercise-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      color: var(--accent2);
      text-decoration: none;
      background: rgba(167,139,250,0.1);
      border: 1px solid rgba(167,139,250,0.2);
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 500;
      transition: background 0.15s;
    }
    .exercise-link:active { background: rgba(167,139,250,0.25); }

    /* Simple day (Saturday, Sunday) */
    .simple-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 10px;
    }
    .simple-card .exercise-name { margin-bottom: 8px; }

    .check-box {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .check-box.checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .check-box.checked::after {
      content: '✓';
      color: white;
      font-size: 13px;
      font-weight: 700;
    }

    .exercise-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .exercise-info { flex: 1; }

    .progress-bar-wrap {
      margin-top: 6px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .progress-label {
      text-align: right;
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 4px;
    }
  </style>
</head>

const todayIndex = new Date().getDay(); // 0=Sun
const todayName = DAYS[todayIndex];
let currentDay = todayName;

// Checked state per day (persisted in localStorage)
function checkedKey(day) { return `checked_${day}_${new Date().toDateString()}`; }
function getChecked(day) {
  try { return JSON.parse(localStorage.getItem(checkedKey(day)) || '[]'); } catch { return []; }
}
function setChecked(day, arr) {
  try { localStorage.setItem(checkedKey(day), JSON.stringify(arr)); } catch {}
}

function renderTabs() {
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = '';
  DAYS.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (d === currentDay ? ' active' : '') + (d === todayName ? ' today-tab' : '');
    btn.textContent = d.slice(0, 3);
    btn.onclick = () => { currentDay = d; renderTabs(); renderDay(); };
    tabs.appendChild(btn);
  });
  // Scroll active tab into view
  const active = tabs.querySelector('.active');
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

function countExercises(day) {
  const d = DATA[day];
  if (!d) return 0;
  return (d.morning?.length || 0) + (d.bed?.length || 0) + (d.simple?.length || 0);
}

function renderDay() {
  const main = document.getElementById('main');
  const d = DATA[currentDay];
  const checked = getChecked(currentDay);
  const total = countExercises(currentDay);
  const doneCount = checked.length;

  let html = `<div class="day-header">
    <h2>${currentDay}</h2>
    ${currentDay === todayName ? '<span class="today-badge">Today</span>' : ''}
    <div class="progress-bar-wrap" style="margin-top:10px">
      <div class="progress-bar" style="width:${total ? (doneCount/total*100) : 0}%"></div>
    </div>
    <p class="progress-label">${doneCount} / ${total} done</p>
  </div>`;

  if (!d) { main.innerHTML = html + '<p style="color:var(--muted)">Rest day 🎉</p>'; return; }

  function renderExercise(ex, idx) {
    const id = `${currentDay}_${idx}`;
    const isChecked = checked.includes(id);
    return `<div class="exercise-card">
      <div class="exercise-row">
        <div class="check-box${isChecked ? ' checked' : ''}" data-id="${id}" onclick="toggleCheck('${id}')"></div>
        <div class="exercise-info">
          <div class="exercise-name">${ex.name}</div>
          ${ex.detail ? `<div class="exercise-detail">${ex.detail}</div>` : ''}
          ${ex.links?.length ? `<div class="exercise-links">${ex.links.map(l => `<a class="exercise-link" href="${l.url}" target="_blank" rel="noopener">▶ ${l.label}</a>`).join('')}</div>` : ''}
        </div>
      </div>
    </div>`;
  }

  let idx = 0;
  if (d.morning) {
    html += `<div class="section-label morning">☀️ Morning</div>`;
    html += d.morning.map(ex => renderExercise(ex, idx++)).join('');
  }
  if (d.bed) {
    html += `<div class="section-label bed">🌙 Before Bed</div>`;
    html += d.bed.map(ex => renderExercise(ex, idx++)).join('');
  }
  if (d.simple) {
    html += `<div class="section-label morning">📋 Today's Routine</div>`;
    html += d.simple.map(ex => renderExercise(ex, idx++)).join('');
  }

  main.innerHTML = html;
}

function toggleCheck(id) {
  let checked = getChecked(currentDay);
  if (checked.includes(id)) {
    checked = checked.filter(c => c !== id);
  } else {
    checked.push(id);
  }
  setChecked(currentDay, checked);
  renderDay();
}

// Date label
const now = new Date();
document.getElementById('dateLabel').textContent = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

renderTabs();
renderDay();
